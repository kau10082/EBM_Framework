name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pypdf jsonschema reportlab pyyaml
      - name: Run unit tests (offline; network-marked tests skipped)
        run: python -m pytest -q -m "not network"
      - name: absrisk self-test (GRADE 公式黃金值)
        run: python EBM_Analysis/tools/absrisk.py --selftest
